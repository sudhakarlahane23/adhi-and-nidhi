<app-announcement-bar></app-announcement-bar>
<app-header></app-header>

<main class="page-shell">
  <section class="container py-4">
    <div class="page-heading">
      <p class="eyebrow">Collection</p>
      <h1>Explore our jewellery</h1>
      <p>Browse handcrafted rings, necklaces, earrings, and bangles in elegant designs.</p>
    </div>

    <div class="toolbar row g-3 align-items-center">
      <div class="col-lg-8">
        <div class="chip-row">
          <button class="chip" [class.active]="selectedCategory() === 'All'" (click)="selectCategory('All')">All</button>
          <button class="chip" *ngFor="let category of categories()" [class.active]="selectedCategory() === category" (click)="selectCategory(category)">{{ category }}</button>
        </div>
      </div>
      <div class="col-lg-4">
        <input class="search-box" type="text" placeholder="Search products" [value]="searchTerm()" (input)="updateSearch($any($event.target).value)" />
      </div>
    </div>

    <div class="row g-4 mt-2">
      <div class="col-lg-3 col-md-6" *ngFor="let product of visibleProducts()">
        <article class="product-card">
          <img [src]="product.image" [alt]="product.name" />
          <div class="product-body">
            <span class="badge">{{ product.category }}</span>
            <h3>{{ product.name }}</h3>
            <p>{{ product.description }}</p>
            <div class="product-footer">
              <strong>₹{{ product.price | number }}</strong>
              <a class="btn btn-primary" href="https://wa.me/919876543210" target="_blank">WhatsApp</a>
            </div>
          </div>
        </article>
      </div>
    </div>

    <div class="pagination" *ngIf="totalPages() > 1">
      <button class="btn btn-outline" (click)="previousPage()" [disabled]="currentPage() === 1">Previous</button>
      <span>Page {{ currentPage() }} of {{ totalPages() }}</span>
      <button class="btn btn-primary" (click)="nextPage()" [disabled]="currentPage() === totalPages()">Next</button>
    </div>
  </section>
</main>

<app-footer></app-footer>
<app-whatsapp-float></app-whatsapp-float>
