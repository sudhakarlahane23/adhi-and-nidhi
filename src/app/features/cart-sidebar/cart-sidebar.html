<div class="cart-overlay" (click)="close()">

  <aside class="cart-sidebar" (click)="$event.stopPropagation()">

    <div class="cart-header">

      <h2>Shopping Cart</h2>

      <button
        class="close-btn"
        type="button"
        (click)="close()">

        ✕

      </button>

    </div>

    <div class="cart-body">

      <h3>Total Items : {{ cartService.totalItems() }}</h3>

      <hr>

      @for(item of cartService.items(); track item.product['product-id']) {

  <div class="cart-item">

    <img
      [src]="item.product.image"
      [alt]="item.product['product-code']">

    <div class="cart-details">

      <strong>
        {{ item.product['product-code'] }}
      </strong>

      <p>{{ item.product.price }}</p>

      <p>Qty : {{ item.quantity }}</p>

      <div class="cart-actions">

        <button
          class="qty-btn"
          (click)="cartService.decreaseQuantity(item.product['product-id'])">
          −
        </button>

        <span>{{ item.quantity }}</span>

        <button
          class="qty-btn"
          (click)="cartService.increaseQuantity(item.product['product-id'])">
          +
        </button>

        <button
          class="remove-btn"
          (click)="cartService.removeFromCart(item.product['product-id'])">
          X
        </button>

      </div>

    </div>

  </div>

}

    </div>

  </aside>

</div>
