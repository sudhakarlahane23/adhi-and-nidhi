@if (menuOpen) {
<div class="mobile-backdrop" (click)="closeMenu()"></div>
}

<header class="site-header">
  <div class="container">
    <div class="row align-items-center gx-3">
      <div class="col-8 col-md-4">
        <a class="brand" routerLink="/" (click)="closeMenu()">
          <span class="brand-mark">
            <img src="/an-log.png" alt="Adhi & Nidhi Jewellery" />
          </span>
          <span>
            <strong>Adhi & Nidhi</strong>
            <small>Jewellery</small>
          </span>
        </a>
      </div>

      <div class="col-4 col-md-8 d-flex justify-content-end align-items-center">
        <!-- Cart Button - Always Visible -->
        <!-- <button
          class="btn btn-outline cart-btn me-2"
          type="button"
          (click)="openCart()">
            🛒
          @if(totalItems() > 0){
            <span class="cart-count">
              {{ totalItems() }}
            </span>
          }
          <span class="d-none d-md-inline ms-1">
            Cart
          </span>
        </button> -->

        <button
          class="btn cart-btn me-2"
          type="button"
          (click)="openCart()"
          aria-label="Open cart">
          <span class="cart-icon-wrap">
            <svg class="cart-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 4h2l.4 2M7 13h10l3-7H6.4M7 13L5.4 6M7 13l-1.5 5h11.7M10 20a1 1 0 1 0 0.001 0M17 20a1 1 0 1 0 0.001 0"
                stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            @if (totalItems() > 0) {
              <span class="cart-count">{{ totalItems() }}</span>
            }
          </span>
          <span class="cart-label d-none d-md-inline">Cart</span>
        </button>

        <!-- Mobile Menu Button -->
        <button
          class="menu-toggle"
          type="button"
          (click)="toggleMenu()"
          [attr.aria-expanded]="menuOpen"
          [class.is-active]="menuOpen"
          aria-controls="site-navigation"
          aria-label="Toggle navigation">

          <span></span>
          <span></span>
          <span></span>

        </button>

        <!-- Navigation -->
        <nav
          id="site-navigation"
          class="site-nav"
          [class.is-open]="menuOpen">

          <a
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeMenu()">
            Home
          </a>

          <a
            routerLink="/products"
            routerLinkActive="active"
            (click)="closeMenu()">
            Products
          </a>

          <a
            routerLink="/contact"
            routerLinkActive="active"
            (click)="closeMenu()">
            Contact
          </a>

          <!-- <button
            class="btn btn-primary whats-app"
            type="button"
            (click)="openWhatsappPopup()">
            Enquire Now
          </button> -->

        </nav>

      </div>
    </div>
  </div>
</header>

@if(showCart){

  <app-cart-sidebar
      (closed)="closeCart()">
  </app-cart-sidebar>

}
